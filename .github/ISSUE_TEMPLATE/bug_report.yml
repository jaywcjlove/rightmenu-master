name: 🙋‍♂️ [Menuist] - Support & Feedback
description: Get help with Menuist, report bugs, or request features.
title: '🙋‍♂️ Support & Feedback: Menuist'
labels: ['support', 'feedback', 'question']
assignees:
  - jaywcjlove
body:
  - type: markdown
    attributes:
      value: |
        <img align="right" height="86" alt="Menuist" src="https://github.com/user-attachments/assets/9c06aaa1-0a20-47f1-8545-bfd4c08aea59"> Please provide as much detail as possible about your support request or feedback.

        **Menuist** is a highly configurable Finder extension that adds powerful functionality to the right-click menu and toolbar in Finder. It allows for quicker and more convenient operations such as moving and copying files, as well as creating new documents. The application also comes with several practical preset operations, further enhancing your work efficiency.

        ### Contact Information

        If you encounter any issues or need support while using our app, please feel free to contact us through the following methods:

        - **Email Support**: [kennyiseeyou@gmail.com](mailto:kennyiseeyou@gmail.com)
        - **Social Media**: [Twitter(X): @jaywcjlove](https://x.com/jaywcjlove)

        We will respond to your message as soon as possible. Thank you for your support of our app!

  - type: textarea
    attributes:
      label: 🙋‍♂️ How can we help you?
      description: Describe the issue you're facing or the feature you'd like to request.
      placeholder: For example, I'm experiencing an issue with...
    validations:
      required: true

  - type: dropdown
    id: os_version
    attributes:
      label: "💻 Desktop"
      description: Your operating system and version.
      options:
        - macOS 26.x (Tahoe)
        - macOS 15.x (Sequoia)
        - macOS 14.x (Sonoma)
      default: 0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **How can I send you a crash report for one of your apps?**

        - macOS Open Finder
        - Select Go to **Folder…** from the Go menu <kbd>⇧</kbd> + <kbd>⌘</kbd> + <kbd>G</kbd>
        - Enter: **~/Library/Logs/DiagnosticReports**
        - In the resulting list, select all files that starts with the app name, ZIP them, and send me
        - Attach the file to this issue
